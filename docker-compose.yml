version: "3.9"

services:
  apmcm-agent:
    build: .
    container_name: apmcm-agent
    ports:
      - "8501:8501"
    volumes:
      - ./.env:/app/.env:ro
      - ./dataset:/app/dataset
      - ./logs:/app/logs
      - ./workspace:/app/workspace
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped
